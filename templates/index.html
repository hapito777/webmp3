<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube → MP3</title>
  <style>
    :root {
      --bg: #0f0f10;
      --fg: #f5f5f5;
      --muted: #9a9a9a;
      --accent: #ff3344;
      --card: #1a1a1c;
      --border: #2a2a2c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
    }
    form {
      display: flex;
      gap: 8px;
    }
    input[type=url] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type=url]:focus { border-color: var(--accent); }
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover:not(:disabled) { opacity: 0.9; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 20px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      line-height: 1.4;
    }
    .status.show { display: block; }
    .status.working { background: #1d2733; color: #8ab4f8; }
    .status.error { background: #3a1d1d; color: #ff8a8a; word-break: break-word; }
    .status.success { background: #1d3325; color: #8aff9e; }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: -1px;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>YouTube → MP3</h1>
    <p class="subtitle">Paste a YouTube URL and download the audio as mp3.</p>
    <form id="form">
      <input type="url" id="url" placeholder="https://youtube.com/watch?v=..." required autofocus>
      <button type="submit" id="btn">Download</button>
    </form>
    <div class="status" id="status"></div>
  </div>
  <script>
    const form = document.getElementById('form');
    const url = document.getElementById('url');
    const btn = document.getElementById('btn');
    const statusEl = document.getElementById('status');

    function setStatus(kind, html) {
      statusEl.className = 'status show ' + kind;
      statusEl.innerHTML = html;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      setStatus('working', '<span class="spinner"></span>Downloading and converting…');
      try {
        const res = await fetch('/download', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ url: url.value.trim() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Download failed');
        setStatus('success', 'Ready: ' + escapeHtml(data.title));
        window.location = '/file/' + data.file_id + '?title=' + encodeURIComponent(data.title);
      } catch (err) {
        setStatus('error', escapeHtml(err.message));
      } finally {
        btn.disabled = false;
      }
    });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
  </script>
</body>
</html>
